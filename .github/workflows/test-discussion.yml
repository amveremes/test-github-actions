# .github/workflows/announce-release.yml
name: Announce Release

on:
  workflow_dispatch:
    inputs:
      test_title:
        description: "Titre de test"
        required: false
        default: "🧪 Test Discussion"
        type: string
      test_category:
        description: "Catégorie"
        required: false
        default: "general"
        type: choice
        options:
          - general
          - announcements
          - ideas
          - q-a

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create discussion
        id: create
        uses: ./.github/actions/releases-announcement
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          category: ${{ github.event.inputs.test_category }}

      - name: Show result
        run: |
          echo "URL: ${{ steps.create.outputs.announcement_url }}"
