# .github/workflows/test-discussion.yml
name: Test Discussion Creation

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category"
        required: false
        default: "general"
        type: choice
        options:
          - general
          - announcements
          - ideas
      tag:
        description: "Tag name (optional, defaults to latest)"
        required: false
        default: ""

# ⚠️ CRUCIAL : Ajouter ces permissions
permissions:
  contents: read
  discussions: write # ← Permission pour créer des discussions

jobs:
  announcement:
    runs-on: ubuntu-latest
    steps:
      - name: Check discussions enabled
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Vérifier si les discussions sont activées
          REPO="${{ github.repository }}"
          echo "Repository : ${REPO}"
          if gh api "/repos/${REPO}" --jq '.has_discussions' | grep -q "true"; then
            echo "✅ Discussions are enabled!"
          else
            echo "❌ Discussions are NOT enabled"
            echo "Please enable them in: https://github.com/${REPO}/settings"
            exit 1
          fi

      - name: Create test discussion
        uses: ./.github/actions/releases-announcement
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          category: ${{ github.event.inputs.category }}
          repository: "${{ github.repository }}"
