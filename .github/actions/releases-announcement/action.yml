# .github/actions/releases-announcement/action.yml
name: "Releases Announcement"
description: "Create a GitHub Release announcement based on the release notes"

inputs:
  github_token:
    description: "GitHub token with discussions:write permission"
    required: true
  tag:
    description: "Specific tag to announce (defaults to latest)"
    required: false
    default: ""
  category:
    description: "Discussion category (announcements, general, ideas, q-a)"
    required: false
    default: "announcements"

outputs:
  announcement_url:
    description: "URL of the created announcement"
    value: ${{ steps.announcement.outputs.announcement_url }}

runs:
  using: "composite"
  steps:
    - name: Create GitHub Release announcement
      id: announcement
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        set -euo pipefail

        # Get tag to announce
        if [ -n "${{ inputs.tag }}" ]; then
          TAG="${{ inputs.tag }}"
        else
          # Récupérer le dernier tag existant
          TAG=$(gh release list --repo="${{ github.repository }}" --limit 1 --json=tagName --jq='.[0].tagName' 2>/dev/null || echo "")

          # Si aucun tag, utiliser v0.0.0 comme fallback
          if [ -z "$TAG" ]; then
            echo "⚠️ No release found, checking for tag v0.0.0..."
            if git ls-remote --tags "${{ github.repository }}" | grep -q "refs/tags/v0.0.0$"; then
              TAG="v0.0.0"
            else
              echo "❌ No release or tag found. Please create a release first."
              exit 1
            fi
          fi
        fi

        echo "📦 Announcing release: $TAG"

        # Fetch release notes
        RELEASE_NOTES=$(gh release view "$TAG" --repo="${{ github.repository }}" --json=body --jq='.body' 2>/dev/null || echo "Release notes not available")

        # Get organization
        ORG="${{ github.repository_owner }}"
        CATEGORY_SLUG="${{ inputs.category }}"

        echo "🏢 Organization: $ORG"
        echo "📂 Category: $CATEGORY_SLUG"

        # Get category ID
        CATEGORY_ID=$(gh api "/orgs/${ORG}/discussion_categories" --jq ".[] | select(.slug==\"$CATEGORY_SLUG\") | .id" 2>/dev/null || echo "")

        if [ -z "$CATEGORY_ID" ]; then
          echo "⚠️ Category '$CATEGORY_SLUG' not found, trying 'general'..."
          CATEGORY_ID=$(gh api "/orgs/${ORG}/discussion_categories" --jq '.[] | select(.slug=="general") | .id' 2>/dev/null || echo "")
        fi

        if [ -z "$CATEGORY_ID" ]; then
          echo "❌ No valid category found. Available categories:"
          gh api "/orgs/${ORG}/discussion_categories" --jq '.[].slug' 2>/dev/null || echo "Cannot fetch categories"
          exit 1
        fi

        echo "✅ Category ID: $CATEGORY_ID"

        # Create organization discussion
        echo "📝 Creating discussion..."
        DISCUSSION_RESPONSE=$(gh api -X POST "/orgs/${ORG}/discussions" \
          -f title="🚀 Release $TAG" \
          -f body="$RELEASE_NOTES" \
          -f category_id="$CATEGORY_ID" \
          --jq '.html_url' 2>&1)

        # Vérifier si la réponse est une URL valide
        if [[ "$DISCUSSION_RESPONSE" =~ ^https?:// ]]; then
          ANNOUNCEMENT_URL="$DISCUSSION_RESPONSE"
          echo "✅ Announcement created: $ANNOUNCEMENT_URL"
        else
          echo "❌ Failed to create discussion"
          echo "Error: $DISCUSSION_RESPONSE"
          exit 1
        fi

        # Sauvegarder le résultat
        echo "announcement_url=$ANNOUNCEMENT_URL" >> "$GITHUB_OUTPUT"
