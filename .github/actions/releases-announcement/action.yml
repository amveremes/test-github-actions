# .github/actions/releases-announcement/action.yml
runs:
  using: "composite"
  steps:
    - name: Create GitHub Release announcement
      id: announcement
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        set -euo pipefail

        # Get tag to announce
        if [ -n "${{ inputs.tag }}" ]; then
          TAG="${{ inputs.tag }}"
        else
          TAG=$(gh release list --repo="${{ github.repository }}" --limit 1 --json=tagName --jq='.[0].tagName' 2>/dev/null || echo "")
          [ -z "$TAG" ] && echo "❌ No release found" && exit 1
        fi

        echo "📦 Announcing release: $TAG"

        # Get release notes
        RELEASE_NOTES=$(gh release view "$TAG" --repo="${{ github.repository }}" --json=body --jq='.body' 2>/dev/null || echo "Release notes not available")

        # Target repository
        TARGET_REPO="${{ inputs.repository }}"

        # Create discussion using REST API (plus simple)
        # Note: Il faut que les Discussions soient activées dans le dépôt
        DISCUSSION_URL=$(gh api \
          --method POST \
          "/repos/${TARGET_REPO}/discussions" \
          -f title="🚀 Release $TAG" \
          -f body="$RELEASE_NOTES" \
          -f category_id="general" \
          --jq '.html_url' 2>/dev/null || echo "")

        if [ -z "$DISCUSSION_URL" ]; then
          echo "❌ Failed to create discussion"
          echo "💡 Make sure Discussions are enabled in the repository settings"
          exit 1
        fi

        echo "✅ Announcement created: $DISCUSSION_URL"
        echo "announcement_url=$DISCUSSION_URL" >> "$GITHUB_OUTPUT"
